<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | White Tiger Cyber</title>
  <meta name="robots" content="noindex">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/footer.css">

  <!-- Prevent FOUC -->
  <style>
    body { background: #0a0a0a; color: #f0f0f0; }
    #nav-placeholder:empty { min-height: 80px; }
  </style>

  <style>
    .error-page {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      background:
        radial-gradient(ellipse at 50% 60%, rgba(247,148,29,0.06) 0%, transparent 60%),
        var(--color-bg-primary);
    }

    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      color: var(--color-accent);
      opacity: 0.15;
      letter-spacing: -0.05em;
      margin-bottom: -1rem;
      user-select: none;
    }

    .error-logo {
      width: min(280px, 70vw);
      margin-bottom: var(--space-lg);
    }

    .error-heading {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: var(--space-sm);
    }

    .error-message {
      color: var(--color-text-secondary);
      max-width: 40ch;
      margin: 0 auto var(--space-lg);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="nav-placeholder"></div>

  <main id="main-content">
    <div class="error-page">
      <div class="error-code" aria-hidden="true">404</div>
      <img src="/images/WhiteTigerLightText.svg" alt="White Tiger Cyber" class="error-logo fade-in">
      <h1 class="error-heading">Page Not Found</h1>
      <p class="error-message">This page doesn't exist or may have moved. Let's get you back on track.</p>
      <a href="/" class="btn btn-primary">Back to Home</a>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/js/nav.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/components.js"></script>
</body>
</html>
